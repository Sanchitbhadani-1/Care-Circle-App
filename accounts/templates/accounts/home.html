<!DOCTYPE html>
<html>
<head>
    <title>Care Circle</title>
</head>
<body>
    <!-- Welcome heading and tagline -->
    <h1>Welcome to Care Circle</h1>
    <p>A simple way for families to care for the people they love.</p>

    <!-- Show different things depending on whether the person is logged in -->
    {% if user.is_authenticated %}
        <!-- Logged in: greet them and give them a way to log out -->
        <p>Logged in as {{ user.email }}</p>
        <a href="/circles/new/">Create a care circle</a>
        <br>
        <a href="/logout/">Log out</a>
        
    {% else %}
        <!-- Not logged in: offer login or signup links -->
        <a href="/login/">Log in</a> |
        <a href="/signup/">Sign up</a>
    {% endif %}
</body>
</html>
