{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Care Circle</title>
    <!-- Connect our stylesheet to this page -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container">
        <h1>Welcome to Care Circle</h1>
        <p class="tagline">A simple way for families to care for the people they love.</p>

        {% if user.is_authenticated %}
            <p>Logged in as <strong>{{ user.email }}</strong></p>
            <a class="button" href="/circles/new/">Create a care circle</a>
            <a class="button secondary" href="/logout/">Log out</a>
        {% else %}
            <a class="button" href="/login/">Log in</a>
            <a class="button secondary" href="/signup/">Sign up</a>
        {% endif %}
    </div>
</body>
</html>
