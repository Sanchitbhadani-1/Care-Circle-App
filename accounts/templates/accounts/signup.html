<!DOCTYPE html>
<html>
<head>
    <title>Sign Up — Care Circle</title>
</head>
<body>
    <!-- Page heading -->
    <h1>Create your account</h1>

    <!-- If something went wrong show it in red
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <!-- The signup form: sends the new email + password to the server -->
    <form method="post">
        <!-- Security token that proves the form came from my own site -->
        {% csrf_token %}
        <p>
            <label>Email: <input type="email" name="email" required></label>
        </p>
        <p>
            <label>Password: <input type="password" name="password" required></label>
        </p>
        <button type="submit">Sign up</button>
    </form>
</body>
</html>
